name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: [self-hosted]

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    defaults:
      run:
        working-directory: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MartinBot.sln

      - name: Build
        run: dotnet build MartinBot.sln --configuration ${{ matrix.configuration }} --no-restore

      - name: Test
        run: dotnet test MartinBot.sln --configuration ${{ matrix.configuration }} --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.configuration }}
          path: src/TestResults/**/*.trx
          if-no-files-found: ignore
